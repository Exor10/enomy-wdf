<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Quotes & Recent Activity | Enomy Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="font-inter bg-slate-50 text-ink min-h-screen">
  <header class="bg-white border-b border-slate-200">
    <nav class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center gap-4 flex-wrap">
      <a href="./index.html" class="font-semibold">← Enomy Finance</a>
      <ul class="flex items-center gap-5 text-sm font-medium flex-wrap">
        <li><a class="nav-link" href="./index.html">Home</a></li>
        <li><a class="nav-link" href="./converter.html">Currency Converter</a></li>
        <li><a class="nav-link" href="./savings.html">Savings & Investments</a></li>
        <li><a class="nav-link" href="./activity.html">Saved Quotes / Recent Activity</a></li>
        <li><button class="nav-link" data-auth-placeholder>Login</button></li>
      </ul>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-10 space-y-6">
    <h1 class="text-3xl font-bold">Saved Quotes & Recent Activity</h1>
    <p class="demo-banner">Demo local storage only. Data is stored in this browser and not synced to an account.</p>

    <section class="card p-5">
      <h2 class="font-semibold text-xl mb-3">Saved Quotes</h2>
      <div id="saved-quotes" class="space-y-3"></div>
    </section>

    <section class="card p-5">
      <h2 class="font-semibold text-xl mb-3">Recent Currency Conversions</h2>
      <div id="recent-conversions" class="space-y-3"></div>
    </section>

    <section class="card p-5">
      <h2 class="font-semibold text-xl mb-3">Recent Savings Calculations</h2>
      <div id="recent-savings" class="space-y-3"></div>
    </section>
  </main>

  <div id="global-message" class="hidden fixed bottom-4 right-4 z-50 max-w-sm"></div>

  <script src="./js/storage.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/activity.js"></script>
</body>
</html>
