<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currency Converter | Enomy Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#3B82F6',
            ink: '#0F172A'
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif']
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="font-inter bg-slate-50 text-ink min-h-screen">
  <header class="bg-white border-b border-slate-200">
    <nav class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="./index.html" class="font-semibold">← Back Home</a>
      <span class="text-slate-500 text-sm">Live currency conversion</span>
    </nav>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-12">
    <section class="card p-6 md:p-8">
      <h1 class="text-3xl font-bold mb-2">Currency Converter</h1>
      <p class="text-slate-600 mb-6">Convert between GBP, USD, EUR, BRL, JPY, and TRY using live exchange rates.</p>

      <div class="grid sm:grid-cols-2 gap-4">
        <label class="field sm:col-span-2">
          <span>Amount</span>
          <input id="amount" type="number" min="0" step="0.01" value="100" />
        </label>
        <label class="field">
          <span>From currency</span>
          <select id="from-currency"></select>
        </label>
        <label class="field">
          <span>To currency</span>
          <select id="to-currency"></select>
        </label>
      </div>

      <div class="mt-5 flex flex-wrap gap-3">
        <button id="convert-btn" class="px-5 py-2.5 rounded-full bg-brand text-white font-semibold hover:-translate-y-0.5 transition">Convert</button>
        <button id="swap-btn" class="px-5 py-2.5 rounded-full border border-slate-300 bg-white font-semibold hover:bg-slate-100 transition">Swap</button>
      </div>

      <div class="result mt-6">
        <p class="text-sm text-slate-500 uppercase tracking-wide">Converted value</p>
        <p id="converted-value" class="text-3xl font-bold mt-2">-</p>
        <p id="exchange-rate" class="text-slate-600 mt-2">Exchange rate: -</p>
        <p id="last-updated" class="text-slate-500 text-sm mt-1">Last updated: -</p>
      </div>

      <p id="error-message" class="hidden mt-4 text-red-700 bg-red-50 border border-red-200 rounded-lg p-3"></p>
    </section>
  </main>

  <script src="./js/currency.js"></script>
</body>
</html>
