<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currency Converter | Enomy Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#0F172A',
            accent: '#3B82F6',
            highlight: '#22C55E',
            surface: '#F8FAFC'
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            poppins: ['Poppins', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-surface font-inter text-navy min-h-screen">
  <header class="border-b border-slate-200 bg-white/80 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <img src="assets/logo.svg" alt="Enomy Finance logo" class="h-9 w-9 rounded-xl" />
        <span class="font-poppins font-semibold">Enomy Finance</span>
      </a>
      <a href="index.html" class="btn-secondary text-sm">← Back Home</a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-12 grid lg:grid-cols-5 gap-8">
    <section class="lg:col-span-3 glass-card p-8 space-y-6">
      <div>
        <h1 class="font-poppins text-3xl font-bold mb-2">Real-Time Currency Converter</h1>
        <p class="text-slate-600">Convert amounts instantly across major currencies with live data.</p>
      </div>

      <div class="grid sm:grid-cols-2 gap-5">
        <label class="input-group sm:col-span-2">
          <span>Amount</span>
          <input type="number" id="amount" value="100" min="0" step="0.01" />
        </label>
        <label class="input-group">
          <span>From Currency</span>
          <select id="fromCurrency"></select>
        </label>
        <label class="input-group">
          <span>To Currency</span>
          <select id="toCurrency"></select>
        </label>
      </div>

      <div class="flex flex-wrap gap-4">
        <button id="convertBtn" class="btn-primary">Convert</button>
        <button id="swapBtn" class="btn-secondary">Swap Currencies</button>
      </div>

      <div class="result-card" id="resultCard">
        <p class="text-sm uppercase tracking-wide text-slate-500">Converted Amount</p>
        <p id="convertedAmount" class="font-poppins text-4xl font-bold mt-2">-</p>
        <p id="exchangeRate" class="text-slate-600 mt-3">Exchange rate: -</p>
        <p id="lastUpdated" class="text-sm text-slate-500 mt-1">Last updated: -</p>
      </div>
      <p id="errorMessage" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-xl px-4 py-3"></p>
    </section>

    <aside class="lg:col-span-2 space-y-6">
      <div class="glass-card p-6">
        <h2 class="font-poppins text-xl font-semibold mb-4">Rate Snapshot</h2>
        <canvas id="trendChart" height="220"></canvas>
      </div>
      <div class="glass-card p-6">
        <h3 class="font-poppins text-lg font-semibold mb-3">Supported Currencies</h3>
        <div id="currencyTags" class="flex flex-wrap gap-2"></div>
      </div>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/currency.js"></script>
</body>
</html>
